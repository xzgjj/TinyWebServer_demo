name: C++ CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  BUILD_TYPE: Debug

jobs:
  build-and-test:
    name: Build + ASan Smoke Tests
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake g++ ninja-build

    - name: Configure CMake
      run: >
        cmake -S . -B build -G Ninja
        -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }}
        -DBUILD_TESTING=ON
        -DENABLE_ASAN=ON

    - name: Build
      run: cmake --build build --parallel

    - name: Run Smoke Tests
      run: ctest --test-dir build --output-on-failure --timeout 60 -L smoke

  memcheck:
    name: Valgrind Memcheck
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake g++ ninja-build valgrind

    - name: Configure CMake (ASan OFF)
      run: >
        cmake -S . -B build -G Ninja
        -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }}
        -DBUILD_TESTING=ON
        -DENABLE_ASAN=OFF

    - name: Build
      run: cmake --build build --parallel

    - name: Run Valgrind on Smoke Targets
      run: |
        set -euo pipefail
        tests=(test_timer test_basic test_multithread_reactor test_log)
        mkdir -p build/valgrind_logs
        for t in "${tests[@]}"; do
          echo ">>> Valgrind: ${t}"
          valgrind --tool=memcheck \
                   --leak-check=full \
                   --show-leak-kinds=all \
                   --track-origins=yes \
                   --error-exitcode=1 \
                   "./build/${t}" > "build/valgrind_logs/${t}.log" 2>&1
          tail -n 20 "build/valgrind_logs/${t}.log"
        done

    - name: Upload Valgrind Logs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: valgrind-logs
        path: build/valgrind_logs

  benchmark:
    name: Performance Benchmark
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake g++ ninja-build python3

    - name: Configure CMake
      run: >
        cmake -S . -B build -G Ninja
        -DCMAKE_BUILD_TYPE=Release
        -DBUILD_TESTING=ON
        -DBUILD_BENCHMARKS=ON

    - name: Build
      run: cmake --build build --parallel

    - name: Restore Baseline from Cache
      if: github.event_name == 'pull_request'
      uses: actions/cache@v4
      id: baseline-cache
      with:
        path: benchmark_results/baseline
        key: benchmark-baseline-main-${{ hashFiles('CMakeLists.txt') }}
        restore-keys: |
          benchmark-baseline-main-

    - name: Run All Benchmark Tests
      run: |
        # 创建当前结果目录
        mkdir -p benchmark_results/current

        # 运行四种基准测试类型
        for benchmark_type in qps latency memory concurrent; do
          echo "========================================="
          echo "运行 $benchmark_type 基准测试..."
          echo "========================================="

          ./build/benchmark_runner run --type $benchmark_type \
            --duration 10 \
            --connections 50 \
            --output benchmark_results/current/$benchmark_type

          # 检查是否成功
          if [ $? -eq 0 ]; then
            echo "✅ $benchmark_type 基准测试完成"
          else
            echo "❌ $benchmark_type 基准测试失败"
            # 不立即退出，继续其他测试
          fi
        done

    - name: Compare with Baseline (PR only)
      if: github.event_name == 'pull_request'
      run: |
        BASELINE_DIR="benchmark_results/baseline"
        CURRENT_DIR="benchmark_results/current"

        # 检查基线是否存在
        if [ -d "$BASELINE_DIR" ] && [ "$(ls -A $BASELINE_DIR 2>/dev/null)" ]; then
          echo "✅ 找到基线结果，开始性能回归检测..."

          # 对每种测试类型进行对比
          all_passed=true
          for benchmark_type in qps latency memory concurrent; do
            baseline_file="$BASELINE_DIR/$benchmark_type/result.json"
            current_file="$CURRENT_DIR/$benchmark_type/result.json"

            if [ -f "$baseline_file" ] && [ -f "$current_file" ]; then
              echo "---------------------------------------------------------"
              echo "对比 $benchmark_type 测试结果..."
              echo "---------------------------------------------------------"

              # 运行对比脚本
              if python3 scripts/compare_benchmark.py \
                "$baseline_file" \
                "$current_file" \
                --threshold 0.15 \
                --fail-on-regression; then
                echo "✅ $benchmark_type: 通过性能回归检测"
              else
                echo "❌ $benchmark_type: 检测到性能回归"
                all_passed=false
              fi
            else
              echo "⚠️  $benchmark_type: 缺少基线或当前结果文件"
            fi
          done

          # 如果有任何测试失败，则整个job失败
          if [ "$all_passed" = false ]; then
            echo "::error::检测到性能回归，请检查基准测试结果"
            exit 1
          fi

        else
          echo "::warning::未找到基线结果，跳过性能回归检测"
          echo "首次运行或基线未设置，需要先在main分支上运行基准测试建立基线"
        fi

    - name: Save Baseline to Cache
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      uses: actions/cache@v4
      with:
        path: benchmark_results/current
        key: benchmark-baseline-main-${{ hashFiles('CMakeLists.txt') }}-${{ github.sha }}
