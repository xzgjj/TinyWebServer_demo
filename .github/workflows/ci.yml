name: C++ CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  BUILD_TYPE: Debug

jobs:
  build-and-test:
    name: Build + ASan Smoke Tests
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake g++ ninja-build

    - name: Configure CMake
      run: >
        cmake -S . -B build -G Ninja
        -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }}
        -DBUILD_TESTING=ON
        -DENABLE_ASAN=ON

    - name: Build
      run: cmake --build build --parallel

    - name: Run Smoke Tests
      run: ctest --test-dir build --output-on-failure --timeout 60 -L smoke

  memcheck:
    name: Valgrind Memcheck
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake g++ ninja-build valgrind

    - name: Configure CMake (ASan OFF)
      run: >
        cmake -S . -B build -G Ninja
        -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }}
        -DBUILD_TESTING=ON
        -DENABLE_ASAN=OFF

    - name: Build
      run: cmake --build build --parallel

    - name: Run Valgrind on Smoke Targets
      run: |
        set -euo pipefail
        tests=(test_timer test_basic test_multithread_reactor test_log)
        mkdir -p build/valgrind_logs
        for t in "${tests[@]}"; do
          echo ">>> Valgrind: ${t}"
          valgrind --tool=memcheck \
                   --leak-check=full \
                   --show-leak-kinds=all \
                   --track-origins=yes \
                   --error-exitcode=1 \
                   "./build/${t}" > "build/valgrind_logs/${t}.log" 2>&1
          tail -n 20 "build/valgrind_logs/${t}.log"
        done

    - name: Upload Valgrind Logs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: valgrind-logs
        path: build/valgrind_logs
